<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reto Health · Administración</title>
<meta name="description" content="Panel interno del holding Reto Health · 1 cuenta agencia + 4 sub-cuentas (Clínica, Residences, E-Commerce, R&D)." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --navy-900:#0a1929; --navy-800:#0f2238; --navy-700:#152e4a; --navy-600:#1f3d5c;
  --copper:#b87333; --copper-soft:#d49862; --copper-dim:#8a5527;
  --sage:#7a9b76; --sage-soft:#a8c2a4;
  --gold:#c9a96e; --gold-dim:#9b7f49;
  --plum:#7c5b8a; --plum-soft:#a988b6;
  --cream:#faf7f2; --paper:#ffffff; --paper-2:#f4efe6;
  --ink:#0e1620; --ink-2:#374151; --muted:#6b7280; --line:#e6dfd2;
  --ok:#10b981; --warn:#f59e0b; --err:#ef4444; --info:#3b82f6;
  --shadow-sm: 0 1px 2px rgba(15,34,56,.06);
  --shadow:    0 6px 20px rgba(15,34,56,.07), 0 1px 3px rgba(15,34,56,.04);
  --shadow-lg: 0 18px 40px rgba(15,34,56,.10);
  --r-sm:6px; --r:10px; --r-lg:16px;
  --sidebar-w:248px;
  --display: 'Playfair Display', Georgia, serif;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  --ws-accent: var(--copper);
}
[data-theme="dark"]{
  --cream:#0a1320; --paper:#0f1c2e; --paper-2:#152838;
  --ink:#eef3f8; --ink-2:#c1cbd6; --muted:#7d8a99; --line:#1d3148;
  --copper:#d49862;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans); color:var(--ink); background:var(--cream); -webkit-font-smoothing:antialiased; min-height:100vh}
a{color:inherit; text-decoration:none}
button{font-family:inherit; cursor:pointer; border:0; background:none; color:inherit}
input,select,textarea{font-family:inherit}

/* ===== LAYOUT ===== */
.app{display:grid; grid-template-columns:var(--sidebar-w) 1fr; min-height:100vh}
.sidebar{background:var(--navy-900); color:#dfe6ef; padding:14px 14px 24px; position:sticky; top:0; height:100vh; overflow-y:auto; border-right:1px solid rgba(255,255,255,.04)}


.brand-row{display:flex;align-items:center;gap:8px;padding:2px 4px 10px;margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,.05)}
.logo{width:28px;height:24px;flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.brand-name{font-family:var(--display);font-size:14px;font-weight:600;color:#fff;line-height:1}
.brand-sub{font-size:8.5px;text-transform:uppercase;letter-spacing:1.6px;color:#8aa0b8;margin-top:1px}
/* ===== WORKSPACE SWITCHER ===== */
.ws-switcher{position:relative;margin-bottom:14px}
.ws-current{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:7px;background:rgba(255,255,255,.04);cursor:pointer;border:1px solid rgba(255,255,255,.06);transition:background .15s}
.ws-current:hover{background:rgba(255,255,255,.08)}
.ws-mark{width:22px;height:22px;border-radius:5px;display:grid;place-items:center;font-family:var(--display);font-weight:700;color:#fff;font-size:11px;flex-shrink:0}
.ws-name{font-size:11.5px;font-weight:600;color:#fff;line-height:1.05}
.ws-sub{font-size:9px;color:#8aa0b8;text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.ws-caret{width:14px;height:14px;margin-left:auto;color:#8aa0b8;flex-shrink:0;stroke-width:2}
.ws-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--navy-800);border:1px solid rgba(255,255,255,.08);border-radius:10px;box-shadow:0 18px 40px rgba(0,0,0,.35);padding:6px;z-index:20;display:none}
.ws-menu.open{display:block}
.ws-opt{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer;font-size:13px;color:#dfe6ef}
.ws-opt:hover{background:rgba(255,255,255,.06)}
.ws-opt .ws-mark{width:24px;height:24px;font-size:11px}
.ws-opt small{display:block;font-size:11px;color:#8aa0b8;margin-top:1px}
.ws-divider{height:1px;background:rgba(255,255,255,.08);margin:4px 6px}

.nav-group{margin:14px 0 4px;padding:0 8px;font-size:10.5px;letter-spacing:1.4px;color:#7a90a8;text-transform:uppercase;font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:8px;color:#c9d4e1;font-size:14px;cursor:pointer;transition:background .15s,color .15s;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.04);color:#fff}
.nav-item.active{background:linear-gradient(90deg,rgba(184,115,51,.20),rgba(184,115,51,.04));color:#fff;box-shadow:inset 2px 0 0 var(--ws-accent)}
.nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.85}
.nav-item.active svg{color:var(--ws-accent);opacity:1}
.nav-pill{margin-left:auto;font-size:10.5px;background:rgba(255,255,255,.08);color:#fff;padding:1px 7px;border-radius:99px;font-weight:500}
.nav-pill.warn{background:rgba(245,158,11,.20);color:#fde08a}
.nav-pill.err{background:rgba(239,68,68,.22);color:#ffb1ad}

.sidebar-foot{margin-top:18px;padding:14px 8px 6px;border-top:1px solid rgba(255,255,255,.07);font-size:12px;color:#7a90a8}
.sidebar-foot .row{display:flex;align-items:center;gap:9px}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--sage),var(--copper));display:grid;place-items:center;color:#fff;font-weight:600;font-size:12px;flex-shrink:0}

/* ===== TOPBAR ===== */
.main{display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 28px;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
.crumbs{font-size:13px;color:var(--muted)}
.crumbs strong{color:var(--ink);font-weight:600}
.crumbs .sep{margin:0 6px;color:var(--line)}
.crumbs .ws{font-weight:600;color:var(--ws-accent)}
.search{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--paper-2);border-radius:99px;width:340px;color:var(--muted);font-size:13px;border:1px solid transparent}
.search:focus-within{border-color:var(--ws-accent);background:var(--paper)}
.search input{background:transparent;border:0;outline:0;flex:1;color:var(--ink);font-size:13px}
.spacer{flex:1}
.icon-btn{width:36px;height:36px;border-radius:8px;display:grid;place-items:center;color:var(--ink-2)}
.icon-btn:hover{background:var(--paper-2);color:var(--ink)}
.dot-badge{position:relative}
.dot-badge::after{content:"";position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--ws-accent)}

/* ===== CONTENT ===== */
.content{padding:26px 30px 60px;max-width:1480px;width:100%}

.page-head{display:flex;align-items:flex-end;gap:18px;margin-bottom:22px;flex-wrap:wrap}
.page-title{font-family:var(--display);font-size:30px;font-weight:600;letter-spacing:-.5px;line-height:1.1;margin:0}
.page-sub{color:var(--muted);font-size:14px;margin-top:6px}
.page-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.ws-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--ws-accent);padding:3px 9px;background:color-mix(in srgb, var(--ws-accent) 12%, transparent);border-radius:99px;margin-bottom:8px}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--line);background:var(--paper);color:var(--ink);transition:all .15s;box-shadow:var(--shadow-sm)}
.btn:hover{border-color:var(--ws-accent);color:var(--ws-accent)}
.btn-primary{background:var(--navy-900);color:#fff;border-color:var(--navy-900)}
.btn-primary:hover{background:var(--ws-accent);border-color:var(--ws-accent);color:#fff}
.btn-ghost{background:transparent;border-color:transparent;box-shadow:none;color:var(--ink-2)}
.btn-ghost:hover{background:var(--paper-2);color:var(--ink)}

/* ===== KPI cards ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.kpi{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--ws-accent),var(--sage))}
.kpi-label{font-size:11.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600}
.kpi-value{font-family:var(--display);font-size:28px;font-weight:600;margin:8px 0 4px;letter-spacing:-.5px}
.kpi-trend{font-size:12.5px;display:flex;align-items:center;gap:4px}
.up{color:var(--ok)}.down{color:var(--err)}.flat{color:var(--muted)}

/* ===== CARD / PANELS ===== */
.grid-2{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px}
.grid-2-eq{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:18px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);overflow:hidden}
.card-h{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--line)}
.card-h h3{margin:0;font-size:15px;font-weight:600;letter-spacing:-.2px}
.card-h .meta{font-size:12px;color:var(--muted);margin-left:auto}
.card-b{padding:18px 20px}
.card-b.flush{padding:0}

/* ===== TABLE ===== */
.table{width:100%;border-collapse:collapse;font-size:13.5px}
.table th{text-align:left;font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:10px 14px;border-bottom:1px solid var(--line);background:var(--paper-2)}
.table td{padding:12px 14px;border-bottom:1px solid var(--line);color:var(--ink-2)}
.table tr:last-child td{border-bottom:0}
.table tr:hover td{background:var(--paper-2)}
.table tr.clickable{cursor:pointer}
.table tr.row-active td{background:color-mix(in srgb, var(--ws-accent) 8%, var(--paper-2));border-left:2px solid var(--ws-accent)}
.tag{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:99px;font-size:11.5px;font-weight:500;background:var(--paper-2);color:var(--ink-2)}
.tag.ok{background:rgba(16,185,129,.10);color:#0a8059}
.tag.warn{background:rgba(245,158,11,.12);color:#a96b00}
.tag.err{background:rgba(239,68,68,.10);color:#b1342f}
.tag.info{background:rgba(59,130,246,.10);color:#1e51b8}
.tag.copper{background:rgba(184,115,51,.12);color:var(--copper-dim)}
.tag.sage{background:rgba(122,155,118,.15);color:#496a47}
.tag.plum{background:rgba(124,91,138,.14);color:#5d4068}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--muted)}
.dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.err{background:var(--err)} .dot.copper{background:var(--copper)}

/* ===== KANBAN ===== */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.kan-col{background:var(--paper-2);border-radius:var(--r-lg);padding:12px;min-height:340px}
.kan-h{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12.5px;font-weight:600;color:var(--ink-2);text-transform:uppercase;letter-spacing:.8px}
.kan-h .count{margin-left:auto;background:var(--paper);padding:2px 8px;border-radius:99px;font-size:11px;color:var(--muted)}
.kan-card{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow-sm)}
.kan-card:hover{border-color:var(--ws-accent)}
.kan-card .t{font-size:13.5px;font-weight:500;margin-bottom:6px;line-height:1.3}
.kan-card .m{font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;gap:6px}

/* ===== Calendar ===== */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:12px}
.cal .d{aspect-ratio:1;display:grid;place-items:center;border-radius:6px;color:var(--ink-2)}
.cal .d.head{font-weight:600;color:var(--muted);text-transform:uppercase;font-size:10.5px;letter-spacing:.8px}
.cal .d.has{background:var(--paper-2);font-weight:500;cursor:pointer}
.cal .d.today{background:var(--ws-accent);color:#fff;font-weight:600}
.cal .d.has:hover{background:color-mix(in srgb, var(--ws-accent) 60%, white);color:#fff}

/* ===== Chat ===== */
.chat{display:grid;grid-template-rows:1fr auto;height:540px}
.chat-msgs{padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.msg{max-width:78%;padding:11px 14px;border-radius:14px;font-size:13.5px;line-height:1.5}
.msg.bot{background:var(--paper-2);border-bottom-left-radius:4px;align-self:flex-start;color:var(--ink-2)}
.msg.me{background:var(--navy-900);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.msg .who{font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px;opacity:.65}
.chat-in{display:flex;gap:8px;padding:14px;border-top:1px solid var(--line);background:var(--paper-2)}
.chat-in input{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:99px;padding:10px 16px;font-size:13.5px;outline:0}
.chat-in input:focus{border-color:var(--ws-accent)}

/* ===== Lists ===== */
.list-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.list-item:last-child{border-bottom:0}
.li-ic{width:34px;height:34px;border-radius:9px;background:var(--paper-2);display:grid;place-items:center;color:var(--ws-accent);flex-shrink:0}
.li-t{font-size:13.5px;font-weight:500}
.li-m{font-size:12px;color:var(--muted)}

/* ===== Forms ===== */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.field label{display:block;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:var(--paper);font-size:13.5px;color:var(--ink);outline:0}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ws-accent)}

.bar{height:6px;background:var(--paper-2);border-radius:99px;overflow:hidden}
.bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--sage),var(--ws-accent));border-radius:99px}
.section-title{font-size:11.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600;margin:0 0 8px}

.clickable{cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s}
.clickable:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--ws-accent)}
.kpi.clickable{position:relative}
.kpi.clickable::after{content:"▾";position:absolute;top:14px;right:14px;font-size:11px;color:var(--muted);transition:transform .2s}
.kpi.clickable.expanded::after{transform:rotate(180deg)}
.kpi-detail{display:none;margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);font-size:12.5px;color:var(--ink-2);line-height:1.5}
.kpi.expanded .kpi-detail{display:block;animation:fade .25s ease}
.kpi-mini-bar{display:flex;align-items:flex-end;gap:3px;height:36px;margin:8px 0}
.kpi-mini-bar i{flex:1;background:var(--ws-accent);opacity:.5;border-radius:2px 2px 0 0;display:block;transition:opacity .2s}
.kpi.expanded .kpi-mini-bar i{opacity:1}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}



/* ===== DRAWER (slide-in derecha) ===== */
.drawer-backdrop{position:fixed;inset:0;background:rgba(10,25,41,.45);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50}
.drawer-backdrop.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:480px;max-width:92vw;background:var(--paper);box-shadow:-12px 0 40px rgba(0,0,0,.18);transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,.26,1);z-index:51;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-h{display:flex;align-items:center;gap:10px;padding:18px 22px;border-bottom:1px solid var(--line)}
.drawer-h h3{margin:0;font-family:var(--display);font-size:18px;font-weight:600}
.drawer-tag{font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ws-accent);font-weight:600;padding:3px 9px;background:color-mix(in srgb,var(--ws-accent) 12%,transparent);border-radius:99px}
.drawer-close{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--muted);cursor:pointer}
.drawer-close:hover{background:var(--paper-2);color:var(--ink)}
.drawer-b{padding:18px 22px;overflow-y:auto;flex:1}
.drawer-f{display:flex;gap:8px;padding:14px 22px;border-top:1px solid var(--line);background:var(--paper-2)}
.drawer .field{margin-bottom:14px}

/* ===== COMMAND PALETTE (⌘K) ===== */
.cmdk-backdrop{position:fixed;inset:0;background:rgba(10,25,41,.45);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .15s;z-index:60}
.cmdk-backdrop.open{opacity:1;pointer-events:auto}
.cmdk{position:fixed;top:14vh;left:50%;transform:translateX(-50%) scale(.96);width:600px;max-width:92vw;max-height:70vh;background:var(--paper);border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,.25);overflow:hidden;display:flex;flex-direction:column;opacity:0;transition:transform .15s,opacity .15s;z-index:61}
.cmdk.open{transform:translateX(-50%) scale(1);opacity:1}
.cmdk-in{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
.cmdk-in svg{width:18px;height:18px;color:var(--muted);flex-shrink:0}
.cmdk-in input{flex:1;border:0;outline:0;background:transparent;font-size:15px;color:var(--ink);font-family:var(--sans)}
.cmdk-list{overflow-y:auto;padding:8px}
.cmdk-group{margin-top:10px}
.cmdk-group:first-child{margin-top:0}
.cmdk-grouph{font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600;padding:6px 12px}
.cmdk-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13.5px}
.cmdk-item:hover,.cmdk-item.sel{background:var(--paper-2)}
.cmdk-item.sel{box-shadow:inset 2px 0 0 var(--ws-accent)}
.cmdk-item .ic{width:16px;height:16px;color:var(--muted)}
.cmdk-item .meta{margin-left:auto;font-size:11.5px;color:var(--muted)}
.cmdk-foot{display:flex;gap:14px;padding:8px 14px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);background:var(--paper-2)}
.cmdk-foot kbd{font-family:var(--mono);background:var(--paper);padding:1px 5px;border-radius:4px;border:1px solid var(--line)}

/* ===== KANBAN DRAG-DROP ===== */
.kan-card[draggable="true"]{user-select:none}
.kan-card.dragging{opacity:.4;transform:rotate(1deg) scale(.98)}
.kan-col.drop-target{background:color-mix(in srgb,var(--ws-accent) 8%,var(--paper-2));outline:2px dashed var(--ws-accent);outline-offset:-4px}

/* ===== BULK ACTIONS ===== */
.row-check{width:34px;text-align:center}
.row-check input{cursor:pointer;width:14px;height:14px;accent-color:var(--ws-accent)}
.bulk-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--navy-900);color:#fff;padding:10px 14px;border-radius:99px;display:flex;align-items:center;gap:10px;box-shadow:0 12px 40px rgba(0,0,0,.3);z-index:40;transition:transform .25s;font-size:13px}
.bulk-bar.open{transform:translateX(-50%) translateY(0)}
.bulk-bar .count{background:var(--ws-accent);color:#fff;padding:2px 9px;border-radius:99px;font-weight:600;font-size:12px}
.bulk-bar button{padding:6px 12px;border-radius:99px;background:rgba(255,255,255,.10);color:#fff;border:0;font-size:12.5px;cursor:pointer;font-family:var(--sans)}
.bulk-bar button:hover{background:rgba(255,255,255,.18)}
.bulk-bar .x{padding:6px 8px;background:transparent;color:#9bb0c8}

/* ===== COLUMN FILTERS ===== */
.col-filter{display:inline-flex;width:14px;height:14px;margin-left:6px;color:var(--muted);cursor:pointer;vertical-align:middle;opacity:.6}
.col-filter:hover,.col-filter.active{opacity:1;color:var(--ws-accent)}
.filter-pop{position:absolute;background:var(--paper);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-lg);padding:10px;min-width:200px;z-index:30;display:none}
.filter-pop.open{display:block}
.filter-pop input{width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;outline:0;margin-bottom:6px}
.filter-pop input:focus{border-color:var(--ws-accent)}
.filter-pop .actions{display:flex;gap:6px;justify-content:flex-end}
.filter-pop .actions button{font-size:11.5px;padding:4px 9px;border-radius:6px;border:1px solid var(--line);background:var(--paper);cursor:pointer}
.filter-pop .actions button.primary{background:var(--ws-accent);color:#fff;border-color:var(--ws-accent)}
.saved-views{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--paper-2);border-bottom:1px solid var(--line);font-size:12.5px}
.saved-views .chip{font-size:11.5px;padding:4px 10px;border-radius:99px;cursor:pointer;background:var(--paper);border:1px solid var(--line)}
.saved-views .chip.active{background:var(--ws-accent);color:#fff;border-color:var(--ws-accent)}

/* ===== NOTIFICATIONS PANEL ===== */
.notif-pop{position:fixed;top:60px;right:24px;width:380px;max-height:70vh;background:var(--paper);border:1px solid var(--line);border-radius:12px;box-shadow:0 18px 50px rgba(0,0,0,.18);overflow:hidden;display:none;flex-direction:column;z-index:55}
.notif-pop.open{display:flex}
.notif-h{display:flex;align-items:center;gap:8px;padding:14px 18px;border-bottom:1px solid var(--line)}
.notif-h h3{margin:0;font-size:14px;font-weight:600}
.notif-h .meta{margin-left:auto;font-size:11.5px;color:var(--muted)}
.notif-list{overflow-y:auto;flex:1}
.notif{display:flex;gap:11px;padding:12px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s}
.notif:hover{background:var(--paper-2)}
.notif.unread{background:color-mix(in srgb,var(--ws-accent) 4%,var(--paper))}
.notif.unread::before{content:"";display:block;width:6px;height:6px;background:var(--ws-accent);border-radius:50%;margin-top:8px;flex-shrink:0}
.notif:not(.unread)::before{content:"";width:6px;flex-shrink:0}
.notif .ic-w{width:30px;height:30px;border-radius:8px;background:var(--paper-2);display:grid;place-items:center;flex-shrink:0}
.notif .body{flex:1;min-width:0}
.notif .t{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:3px}
.notif .m{font-size:11.5px;color:var(--muted)}
.notif .time{font-size:10.5px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.notif-foot{padding:10px 14px;background:var(--paper-2);font-size:12px;text-align:center;border-top:1px solid var(--line);cursor:pointer;color:var(--ws-accent);font-weight:500}

/* ===== SIDEBAR COLLAPSE ===== */
body.sb-collapsed .app{grid-template-columns:64px 1fr}
body.sb-collapsed .ws-name,body.sb-collapsed .ws-sub,body.sb-collapsed .ws-caret,
body.sb-collapsed .nav-group,body.sb-collapsed .nav-item span:not(.nav-pill),
body.sb-collapsed .sidebar-foot,body.sb-collapsed .brand-text{display:none}
body.sb-collapsed .nav-item{justify-content:center;padding:9px}
body.sb-collapsed .nav-pill{position:absolute;top:2px;right:2px;font-size:9px;padding:1px 5px}
body.sb-collapsed .nav-item{position:relative}
body.sb-collapsed .ws-current{justify-content:center;padding:6px}
body.sb-collapsed .brand-row{justify-content:center}
.sb-toggle{cursor:pointer}


/* ===== NEW ENTITY MODAL ===== */
.modal-backdrop{position:fixed;inset:0;background:rgba(10,25,41,.45);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .2s;z-index:62}
.modal-backdrop.open{opacity:1;pointer-events:auto}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);width:520px;max-width:92vw;max-height:88vh;background:var(--paper);border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,.25);overflow:hidden;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:transform .2s,opacity .2s;z-index:63}
.modal.open{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}
.modal-h{display:flex;align-items:center;gap:10px;padding:18px 22px;border-bottom:1px solid var(--line)}
.modal-h h3{margin:0;font-family:var(--display);font-size:18px;font-weight:600}
.modal-h .x{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--muted);cursor:pointer;border:0;background:0}
.modal-h .x:hover{background:var(--paper-2);color:var(--ink)}
.modal-b{padding:18px 22px;overflow-y:auto;flex:1}
.modal-f{display:flex;gap:8px;padding:14px 22px;border-top:1px solid var(--line);background:var(--paper-2);justify-content:flex-end}
.field.error input,.field.error select,.field.error textarea{border-color:var(--err)}
.field-error{font-size:11px;color:var(--err);margin-top:3px;display:none}
.field.error .field-error{display:block}
.req{color:var(--err);margin-left:2px}

/* ===== INLINE EDIT ===== */
.table td.editable{position:relative;cursor:text}
.table td.editable::after{content:"";position:absolute;left:14px;right:14px;bottom:8px;border-bottom:1px dashed var(--line);opacity:.6}
.table td.editable:hover::after{border-color:var(--ws-accent);opacity:1}
.table td.editing{padding:4px 8px;background:color-mix(in srgb,var(--ws-accent) 6%,var(--paper))}
.table td.editing input,.table td.editing select{width:100%;border:1px solid var(--ws-accent);border-radius:5px;padding:6px 8px;font-size:13px;outline:0;background:var(--paper);color:var(--ink);font-family:var(--sans)}

/* ===== CHURN / RISK BANNER ===== */
.risk-banner{background:linear-gradient(90deg,rgba(245,158,11,.10),rgba(239,68,68,.06));border:1px solid rgba(245,158,11,.25);border-left:4px solid var(--warn);border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:flex-start;gap:14px}
.risk-banner .ic-w{width:34px;height:34px;border-radius:8px;background:rgba(245,158,11,.15);display:grid;place-items:center;color:var(--warn);flex-shrink:0}
.risk-banner h4{margin:0;font-size:14px;font-weight:600;color:#9a6500}
.risk-banner .body{flex:1}
.risk-banner .sub{font-size:12px;color:var(--ink-2);margin-top:2px}
.risk-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.risk-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 11px;background:var(--paper);border-radius:99px;font-size:12px;cursor:pointer;border:1px solid var(--line);transition:border-color .15s,transform .15s}
.risk-pill:hover{border-color:var(--warn);transform:translateY(-1px)}
.risk-pill .score{background:rgba(239,68,68,.10);color:var(--err);padding:1px 7px;border-radius:99px;font-weight:600;font-size:11px}
.risk-pill .arr{color:var(--muted);font-size:14px;margin-left:2px}

/* ===== VOICE BUTTON ===== */
.mic-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:99px;background:var(--paper-2);border:1px solid var(--line);font-size:12.5px;cursor:pointer;color:var(--ink-2);font-family:var(--sans);transition:all .15s}
.mic-btn:hover{border-color:var(--ws-accent);color:var(--ws-accent)}
.mic-btn.recording{background:rgba(239,68,68,.10);border-color:var(--err);color:var(--err)}
.mic-btn.recording svg{animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.voice-note{margin-top:14px;padding:12px 14px;background:color-mix(in srgb,var(--ws-accent) 4%,var(--paper-2));border-left:3px solid var(--ws-accent);border-radius:8px;font-size:13px;line-height:1.5}
.voice-note .when{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy-900);color:#fff;padding:12px 16px;border-radius:10px;font-size:13px;box-shadow:var(--shadow-lg);z-index:80;transform:translateY(120%);transition:transform .25s;display:flex;align-items:center;gap:8px}
.toast.open{transform:translateY(0)}
.toast.success{background:#0a6b3f}
.toast.error{background:#9c1d1d}

.income{color:#0a6b3f;font-weight:600}
.expense{color:#9c1d1d;font-weight:600}
.income-bg{background:rgba(10,107,63,.10)}
.expense-bg{background:rgba(156,29,29,.08)}
.kpi.income-card .kpi-value{color:#0a6b3f}
.kpi.expense-card .kpi-value{color:#9c1d1d}
.kpi.income-card::before{background:linear-gradient(90deg,#0a6b3f,#10b981)!important}
.kpi.expense-card::before{background:linear-gradient(90deg,#9c1d1d,#ef4444)!important}

.card.clickable{cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s}
.card.clickable:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--ws-accent)}
.card.card-active{border-color:var(--ws-accent);box-shadow:0 0 0 2px color-mix(in srgb, var(--ws-accent) 30%, transparent)}
.kan-card.kan-active{border-color:var(--ws-accent);background:color-mix(in srgb, var(--ws-accent) 8%, var(--paper));box-shadow:var(--shadow-lg)}
.list-item.clickable{cursor:pointer;transition:background .15s,padding .15s}
.list-item.clickable:hover{background:var(--paper-2);border-radius:8px;padding-left:6px;padding-right:6px}
.cal-filter{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.cal-filter label{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.cal-filter select{padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:var(--paper);font-size:13px;color:var(--ink);min-width:200px}
.cal-filter select:focus{border-color:var(--ws-accent);outline:0}
.chip-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:11.5px;padding:4px 10px;border-radius:99px;background:var(--paper-2);color:var(--ink-2);cursor:pointer;border:1px solid transparent}
.chip:hover{border-color:var(--ws-accent);color:var(--ws-accent)}
.chip.active{background:var(--ws-accent);color:#fff}


.ic{width:18px;height:18px;stroke-width:1.7;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}
.split{display:flex;align-items:center;gap:10px}
.split .v{font-family:var(--display);font-size:22px;font-weight:600}
.muted{color:var(--muted);font-size:12.5px}
.right{margin-left:auto}
.spaced > * + *{margin-top:14px}
.divider{height:1px;background:var(--line);margin:14px 0}

/* Workspace accent overrides */
[data-ws="holding"]{--ws-accent:var(--copper)}
[data-ws="clinica"]{--ws-accent:var(--sage)}

}

<script>
/* ============================================================
   WORKSPACES & MODULE CONFIG
   Una "agency" GHL (Holding) + 4 sub-cuentas (Clínica, Residences, E-Commerce, R&D).
   Cada workspace tiene sus propios módulos.
============================================================ */

/* ============= NAV + WORKSPACE SWITCHER ============= */
function renderWsMenu(){
  const menu = document.getElementById('wsMenu');
  const order = ['holding','clinica','residences','ecommerce','rd'];
  menu.innerHTML = order.map((k,i) => {
    const w = WORKSPACES[k];
    const sep = (k === 'holding') ? '<div class="ws-divider"></div>' : '';
    return `<div class="ws-opt" onclick="setWs('${k}')">
      <div class="ws-mark" style="background:linear-gradient(135deg,${w.accent},${shade(w.accent,-30)})">${w.mark}</div>
      <div><div style="font-weight:600;color:#fff">${w.name}</div><small>${w.sub}</small></div>
    </div>${sep}`;
  }).join('');
}
function shade(hex,p){
  const c = parseInt(hex.slice(1),16);
  let r=(c>>16)&255,g=(c>>8)&255,b=c&255;
  r=Math.min(255,Math.max(0,r+p));g=Math.min(255,Math.max(0,g+p));b=Math.min(255,Math.max(0,b+p));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}
function toggleWsMenu(e){ e?.stopPropagation(); document.getElementById('wsMenu').classList.toggle('open'); }
document.addEventListener('click', () => document.getElementById('wsMenu').classList.remove('open'));

function setWs(ws){
  state.ws = ws;
  state.module = WORKSPACES[ws].modules[0];
  state.calFilter = null;
  document.body.dataset.ws = ws;
  const w = WORKSPACES[ws];
  document.getElementById('wsMark').textContent = w.mark;
  document.getElementById('wsMark').style.background = `linear-gradient(135deg,${w.accent},${shade(w.accent,-30)})`;
  document.getElementById('wsName').textContent = w.name;
  document.getElementById('wsSub').textContent = w.sub;
  document.getElementById('cbWs').textContent = w.name;
  document.getElementById('wsMenu').classList.remove('open');
  renderNav(); renderView();
}

function renderNav(){
  const w = WORKSPACES[state.ws];
  const html = `<div class="nav-group">${w.name === 'Holding' ? 'Vista holding' : 'Operación'}</div>` +
    w.modules.map(m => {
      const badge = w.badges?.[m];
      let pill = '';
      if (badge) {
        if (typeof badge === 'string') pill = `<span class="nav-pill">${badge}</span>`;
        else pill = `<span class="nav-pill ${badge.cls||''}">${badge.text}</span>`;
      }
      return `<div class="nav-item ${m===state.module?'active':''}" onclick="go('${m}')">
        <svg><use href="#${ICONS[m]||'i-grid'}"/></svg><span>${LABELS[m]||m}</span>${pill}
      </div>`;
    }).join('');
  document.getElementById('nav').innerHTML = html;
}
function go(module){
  state.module = module;
  if (module !== 'calendario' && module !== 'citas') state.calFilter = null;
  document.getElementById('cbModule').textContent = LABELS[module] || module;
  renderNav(); renderView();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ============= VIEW DISPATCH ============= */
const charts = {};
function destroyCharts(){ Object.values(charts).forEach(c => c?.destroy()); for(const k in charts) delete charts[k]; }

function renderView(){
  destroyCharts();
  const key = `${state.ws}.${state.module}`;
  const fn = VIEWS[key] || VIEWS[`*.${state.module}`] || (() => placeholder());
  document.getElementById('content').innerHTML = fn();
  // After DOM render, wire up charts/calendars
  setTimeout(initWidgets, 50);
}

function pipelineForecast(opts){
  // opts: {title, weights:[{stage, count, value, prob}], horizons:[{label, value, count}], chartId}

  const totalRaw = opts.weights.reduce((a,w) => a + w.value, 0);
  return `
  <div class="card" style="margin-bottom:18px"><div class="card-h"><h3>Forecast</h3><span class="meta">probabilidad ponderada · cierre esperado</span></div>

        ${opts.horizons.map(h => `<div class="kpi clickable" onclick="kpiToggle(this)"><div class="kpi-label">${h.label}</div><div class="kpi-value">${opts.formatVal(h.value)}</div><div class="kpi-trend ${h.trend||'flat'}">${h.count} ${opts.unit}</div></div>`).join('')}
      </div>
      <div class="grid-2-eq" style="margin-top:14px;margin-bottom:0">
        <div>
          <div class="section-title">Probabilidad por etapa</div>
          ${opts.weights.map(w => `<div style="margin-bottom:10px">
            <div class="split"><strong>${w.stage}</strong><span class="muted right">${w.count} · ${Math.round(w.prob*100)} %</span></div>

          <div style="position:relative;height:220px;width:100%"><canvas id="${opts.chartId}"></canvas></div>
        </div>
      </div>
    </div>
  </div>`;
}

/* ============= Widgets · charts, calendar, chat ============= */
function buildCal(id, today=4){
  const el = document.getElementById(id); if(!el) return;
  const heads = ['L','M','X','J','V','S','D'];
  let html = heads.map(h => `<div class="d head">${h}</div>`).join('');
  for(let i=0;i<4;i++) html += `<div class="d"></div>`;
  for(let d=1; d<=31; d++){
    const has = [4,5,6,7,8,11,12,13,14,15,18,19,20,21,22,25,26,27,28,29].includes(d);
    const cls = d === today ? 'd today' : (has ? 'd has' : 'd');
    html += `<div class="${cls}">${d}</div>`;
  }
  el.innerHTML = html;
}

function kpiToggle(el){
  const open = el.classList.contains('expanded');
  // close others within same grid
  el.parentElement?.querySelectorAll('.kpi.expanded').forEach(k => k.classList.remove('expanded'));
  if (!open) {
    el.classList.add('expanded');
    // inject detail if not already
    if (!el.querySelector('.kpi-detail')){
      const label = el.querySelector('.kpi-label')?.textContent?.trim() || '';
      const value = el.querySelector('.kpi-value')?.textContent?.trim() || '';
      el.insertAdjacentHTML('beforeend', kpiDetailHTML(label, value));
    }
  }
}

// ---------- COMMAND PALETTE ⌘K ----------
let cmdkSel = 0;
let cmdkResults = [];
function openCmdk(){
  document.getElementById('cmdkBackdrop').classList.add('open');
  document.getElementById('cmdk').classList.add('open');
  document.getElementById('cmdkInput').value = '';
  document.getElementById('cmdkInput').focus();
  renderCmdk('');
}
function closeCmdk(){
  document.getElementById('cmdk').classList.remove('open');
  document.getElementById('cmdkBackdrop').classList.remove('open');
}
function fuzzyMatch(q, text){
  q = q.toLowerCase(); text = text.toLowerCase();
  if (!q) return true;
  let i=0;
  for (const c of text){ if (c === q[i]) i++; if (i === q.length) return true; }
  return text.includes(q);
}
function renderCmdk(q){
  cmdkResults = q ? SEARCH_INDEX.filter(it => fuzzyMatch(q, it.name+' '+it.meta)) : SEARCH_INDEX.slice(0, 12);
  cmdkSel = 0;
  // Group by type
  const groups = {};
  cmdkResults.forEach(it => { (groups[it.type] = groups[it.type] || []).push(it); });
  const html = Object.entries(groups).map(([t, items]) => `
    <div class="cmdk-group">
      <div class="cmdk-grouph">${TYPE_LABEL[t]||t} · ${items.length}</div>
      ${items.map((it,idx) => {
        const globalIdx = cmdkResults.indexOf(it);
        return `<div class="cmdk-item" data-idx="${globalIdx}" onmouseover="cmdkHover(${globalIdx})" onclick="cmdkPick(${globalIdx})">
          <svg class="ic"><use href="#${it.icon}"/></svg>
          <div><div>${it.name}</div><div class="cmdk-meta" style="font-size:11.5px;color:var(--muted);margin-top:1px">${it.meta}</div></div>
          <span class="meta">${it.ws}</span>
        </div>`;
      }).join('')}
    </div>`).join('');
  document.getElementById('cmdkList').innerHTML = html || '<div style="padding:30px;text-align:center;color:var(--muted);font-size:13px">Sin resultados</div>';
  highlightCmdk();
}
function cmdkHover(i){ cmdkSel = i; highlightCmdk(); }
function highlightCmdk(){
  document.querySelectorAll('.cmdk-item').forEach(el => el.classList.remove('sel'));
  const sel = document.querySelector(`.cmdk-item[data-idx="${cmdkSel}"]`);
  if (sel) { sel.classList.add('sel'); sel.scrollIntoView({block:'nearest'}); }
}
function cmdkPick(i){
  const item = cmdkResults[i]; if (!item) return;
  closeCmdk();
  if (item.ws !== state.ws) setWs(item.ws);
  setTimeout(() => openDrawer(item), 100);
}
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k'){ e.preventDefault(); openCmdk(); return; }
  const cmdkOpen = document.getElementById('cmdk').classList.contains('open');
  if (cmdkOpen){
    if (e.key === 'Escape'){ closeCmdk(); }
    if (e.key === 'ArrowDown'){ e.preventDefault(); cmdkSel = Math.min(cmdkSel+1, cmdkResults.length-1); highlightCmdk(); }
    if (e.key === 'ArrowUp'){ e.preventDefault(); cmdkSel = Math.max(cmdkSel-1, 0); highlightCmdk(); }
    if (e.key === 'Enter'){ e.preventDefault(); cmdkPick(cmdkSel); }
  }

// ---------- DRAG & DROP KANBAN (event delegation, funciona en TODAS las pipelines) ----------
function initKanbanDnD(){
  // Solo asegura draggable=true en los kan-cards (idempotente)
  document.querySelectorAll('.kan-card').forEach(card => card.setAttribute('draggable','true'));
}

// Listeners globales una sola vez (sobreviven a re-renders)
if (!window._kanbanWired){
  window._kanbanWired = true;
  document.addEventListener('dragstart', e => {
    const card = e.target.closest('.kan-card');
    if (!card) return;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', ''); } catch(_){}
  });
  document.addEventListener('dragend', e => {
    const card = e.target.closest('.kan-card');
    if (card) card.classList.remove('dragging');
    document.querySelectorAll('.kan-col.drop-target').forEach(c => c.classList.remove('drop-target'));
  });
  document.addEventListener('dragover', e => {
    const col = e.target.closest('.kan-col');
    if (!col) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.kan-col.drop-target').forEach(c => { if (c !== col) c.classList.remove('drop-target'); });
    col.classList.add('drop-target');
  });
  document.addEventListener('dragleave', e => {
    // Solo quitar si salimos del kan-col (no de un hijo)
    const col = e.target.closest('.kan-col');
    if (col && !col.contains(e.relatedTarget)) col.classList.remove('drop-target');
  });
  document.addEventListener('drop', e => {
    const col = e.target.closest('.kan-col');
    if (!col) return;
    e.preventDefault();
    col.classList.remove('drop-target');
    const dragging = document.querySelector('.kan-card.dragging');
    if (!dragging) return;
    col.appendChild(dragging);
    // Recalcular contadores de cada columna del mismo kanban
    const kan = col.closest('.kanban');
    if (kan) kan.querySelectorAll('.kan-col').forEach(c => {
      const cnt = c.querySelector('.kan-h .count');
      if (cnt) cnt.textContent = c.querySelectorAll('.kan-card').length;
    });
    const stage = col.querySelector('.kan-h')?.firstChild?.textContent?.trim() || 'etapa';
    const item = dragging.querySelector('.t')?.textContent || 'tarjeta';
    if (typeof toast === 'function') toast(`✓ "${item}" movida a ${stage}`, 'success');
  });
}

/* ============= 9 · INLINE EDIT EN TABLAS ============= */
function injectInlineEdit(){
  document.querySelectorAll('table.table').forEach(tbl => {
    const headers = Array.from(tbl.querySelectorAll('thead th')).map(th => (th.textContent || '').toLowerCase().replace(/[^\wáéíóú\s]/g,'').trim());
    const editableCols = headers.map((h,i) => {
      if (/^(importe|precio|stock|umbral|nps|score|sla|edad|prioridad|estado|owner|asignado|protocolo|plan|antig|email|hora)/i.test(h)) return i;
      return -1;
    }).filter(i => i >= 0);
    tbl.querySelectorAll('tbody tr').forEach(tr => {
      Array.from(tr.children).forEach((td, i) => {
        if (editableCols.includes(i) && !td.classList.contains('editable') && !td.classList.contains('row-check')){
          td.classList.add('editable');
          td.dataset.col = headers[i];
          td.addEventListener('dblclick', startInlineEdit);
        }
      });
    });
  });
}
function startInlineEdit(e){
  const td = e.currentTarget;
  if (td.classList.contains('editing')) return;
  const original = td.textContent.trim();
  td.classList.add('editing');
  // Detect select-type fields
  const col = td.dataset.col || '';
  let inputHTML;
  if (/estado/i.test(col)) inputHTML = `<select><option>Activo</option><option>Pendiente</option><option>Pausado</option><option>Archivado</option></select>`;
  else if (/prioridad/i.test(col)) inputHTML = `<select><option>Baja</option><option>Media</option><option>Alta</option><option>Urgente</option></select>`;
  else if (/owner|asignado/i.test(col)) inputHTML = `<select><option>Jaime</option><option>Jessica</option><option>Tommy</option><option>Marcos</option><option>Miguel</option><option>Iván</option><option>David</option></select>`;
  else inputHTML = `<input value="${original.replace(/"/g,'&quot;')}" />`;
  td.innerHTML = inputHTML;
  const input = td.querySelector('input,select');
  input.focus();
  if (input.select) input.select();
  const finish = (commit) => {
    const val = commit ? input.value : original;
    td.classList.remove('editing');
    td.textContent = val;
    td.classList.add('editable');
    td.addEventListener('dblclick', startInlineEdit);
    if (commit && val !== original) toast(`✓ ${col || 'Campo'} actualizado: ${val}`, 'success');
  };
  input.addEventListener('blur', () => finish(true));
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter'){ ev.preventDefault(); finish(true); }
    if (ev.key === 'Escape'){ ev.preventDefault(); finish(false); }
  });
}

          <div class="risk-pill" onclick="openRisk('Jorge Cabré', 'patient')"><strong>Jorge Cabré</strong><span class="score">71 %</span><span class="muted">Pago pdte.</span><span class="arr">→</span></div>
          <div class="risk-pill" onclick="openRisk('Helena Gil', 'patient')"><strong>Helena Gil</strong><span class="score">64 %</span><span class="muted">Vie 10:00</span><span class="arr">→</span></div>
        </div>
      </div>
    </div>`;
  } else if (v === 'ecommerce.dashboard' || v === 'ecommerce.miembros'){
    banner = `<div class="risk-banner">
      <div class="ic-w"><svg class="ic"><use href="#i-cart"/></svg></div>
      <div class="body">
        <h4>4 miembros con riesgo de churn alto</h4>

          <div class="risk-pill" onclick="openRisk('Ruth Sanz', 'member')"><strong>Ruth Sanz</strong><span class="score">88 %</span><span class="muted">Pro · 9 m</span><span class="arr">→</span></div>
          <div class="risk-pill" onclick="openRisk('Pablo M.', 'member')"><strong>Pablo M.</strong><span class="score">79 %</span><span class="muted">Pro · 4 m</span><span class="arr">→</span></div>
          <div class="risk-pill" onclick="openRisk('Carmen B.', 'member')"><strong>Carmen B.</strong><span class="score">68 %</span><span class="muted">Free · 6 m</span><span class="arr">→</span></div>
          <div class="risk-pill" onclick="openRisk('Diego L.', 'member')"><strong>Diego L.</strong><span class="score">62 %</span><span class="muted">Free · 2 m</span><span class="arr">→</span></div>
        </div>
      </div>
    </div>`;
  }
  if (banner){
    const head = content.querySelector('.page-head');
    if (head && !content.querySelector('.risk-banner')){
      head.insertAdjacentHTML('afterend', banner);
    }
  }
}
function openRisk(name, type){
  const found = SEARCH_INDEX.find(it => it.name.startsWith(name));
  if (found) openDrawer(found);
  else openDrawer({type, name, data:{estado:'En riesgo · contactar'}});
}

/* ============= 16 · VOICE → NOTA CLÍNICA ============= */
let _voiceTimer = null;
function startVoice(){
  const btn = document.getElementById('micBtn'); if (!btn) return;
  if (btn.classList.contains('recording')){
    stopVoice(); return;
  }
  btn.classList.add('recording');
  btn.querySelector('span').textContent = 'Grabando…';
  toast('🎤 Grabando · pulsa otra vez para detener', 'success');
  _voiceTimer = setTimeout(stopVoice, 4000); // auto-stop demo
}
function stopVoice(){
  clearTimeout(_voiceTimer);
  const btn = document.getElementById('micBtn'); if (!btn) return;
  btn.classList.remove('recording');
  btn.querySelector('span').textContent = 'Transcribiendo…';
  toast('Procesando con Whisper…');
  setTimeout(() => {
    btn.querySelector('span').textContent = 'Estructurando con Claude…';
    setTimeout(() => {
      btn.querySelector('span').textContent = 'Dictar nota';
      addVoiceNote();
      toast('✓ Nota añadida al historial', 'success');
    }, 900);
  }, 1100);
}
const VOICE_NOTES = [
  {when:'Hoy 10:24', body:`<strong>Sesión de seguimiento BPC-157 · semana 6</strong><br/>Paciente reporta mejoría en dolor articular (EVA 7→3). Adherencia al protocolo correcta. HRV ligeramente elevada (62 → 68 ms). Recomendación: continuar dosis actual 250 µg/día subcutáneo, revisión a las 2 semanas. Sin efectos adversos reportados.`},
  {when:'Hoy 10:24', body:`<strong>Primera consulta · evaluación inicial</strong><br/>Paciente acude por fatiga crónica y dolor lumbar de 8 meses. Antecedentes: deportista amateur, lesión previa L4-L5. Exploración: contractura paravertebral derecha, ROM reducido en flexión. Plan: hiperbárica 10 sesiones + fisio semanal 6 semanas. Próxima cita en 7 días.`},
  {when:'Hoy 10:25', body:`<strong>Revisión NAD+ · sesión 4</strong><br/>Paciente refiere mayor energía matutina y mejor calidad de sueño desde sesión 3. Marcadores inflamatorios PCR 2,4 → 1,8. Continuar protocolo IV semanal. Sumar Glutatión 600 mg en sesión 6.`}
];
let _voiceIdx = 0;
function addVoiceNote(){
  const drawerB = document.getElementById('drawerBody'); if (!drawerB) return;
  const note = VOICE_NOTES[_voiceIdx % VOICE_NOTES.length]; _voiceIdx++;
  drawerB.insertAdjacentHTML('beforeend', `<div class="voice-note"><div class="when">${note.when} · transcrito por Whisper · estructurado por Claude</div>${note.body}</div>`);
  drawerB.scrollTop = drawerB.scrollHeight;
}

// Hook into openDrawer to add mic button when entity is patient
const _origOpenDrawer = openDrawer;
openDrawer = function(item){
  _origOpenDrawer(item);
  if (item && item.type === 'patient'){
    const tag = document.getElementById('drawerTag');
    if (tag && !document.getElementById('micBtn')){
      tag.insertAdjacentHTML('afterend', '<button id="micBtn" class="mic-btn" onclick="startVoice()" title="Dictar nota clínica"><svg class="ic"><use href="#i-mic"/></svg><span>Dictar nota</span></button>');
    }
  } else {
    document.getElementById('micBtn')?.remove();
  }
};

// Hook into renderView to render risk banner after each view
const _origRenderView2 = renderView;
renderView = function(){
  _origRenderView2();
  setTimeout(() => {
    renderRiskBanner();
    injectInlineEdit();
  }, 100);
};
