/* ============= 9 · INLINE EDIT EN TABLAS ============= */
function injectInlineEdit(){
  document.querySelectorAll('table.table').forEach(tbl => {
    const headers = Array.from(tbl.querySelectorAll('thead th')).map(th => (th.textContent || '').toLowerCase().replace(/[^\wáéíóú\s]/g,'').trim());
    const editableCols = headers.map((h,i) => {
      if (/^(importe|precio|stock|umbral|nps|score|sla|edad|prioridad|estado|owner|asignado|protocolo|plan|antig|email|hora)/i.test(h)) return i;
      return -1;
    }).filter(i => i >= 0);
    tbl.querySelectorAll('tbody tr').forEach(tr => {
      Array.from(tr.children).forEach((td, i) => {
        if (editableCols.includes(i) && !td.classList.contains('editable') && !td.classList.contains('row-check')){
          td.classList.add('editable');
          td.dataset.col = headers[i];
          td.addEventListener('dblclick', startInlineEdit);
        }
      });
    });
  });
}
function startInlineEdit(e){
  const td = e.currentTarget;
  if (td.classList.contains('editing')) return;
  const original = td.textContent.trim();
  td.classList.add('editing');
  // Detect select-type fields
  const col = td.dataset.col || '';
  let inputHTML;
  if (/estado/i.test(col)) inputHTML = `<select><option>Activo</option><option>Pendiente</option><option>Pausado</option><option>Archivado</option></select>`;
  else if (/prioridad/i.test(col)) inputHTML = `<select><option>Baja</option><option>Media</option><option>Alta</option><option>Urgente</option></select>`;
  else if (/owner|asignado/i.test(col)) inputHTML = `<select><option>Jaime</option><option>Jessica</option><option>Tommy</option><option>Marcos</option><option>Miguel</option><option>Iván</option><option>David</option></select>`;
  else inputHTML = `<input value="${original.replace(/"/g,'&quot;')}" />`;
  td.innerHTML = inputHTML;
  const input = td.querySelector('input,select');
  input.focus();
  if (input.select) input.select();
  const finish = (commit) => {
    const val = commit ? input.value : original;
    td.classList.remove('editing');
    td.textContent = val;
    td.classList.add('editable');
    td.addEventListener('dblclick', startInlineEdit);
    if (commit && val !== original) toast(`✓ ${col || 'Campo'} actualizado: ${val}`, 'success');
  };
  input.addEventListener('blur', () => finish(true));
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter'){ ev.preventDefault(); finish(true); }
    if (ev.key === 'Escape'){ ev.preventDefault(); finish(false); }
  });
}

/* ============= 12 · NL SEARCH (upgrade ⌘K) ============= */
const NL_PATTERNS = [
  {re:/no han venido|sin venir|no asistido|no-show/i, type:'patient', filter:p => /Luis|Jorge|Helena/.test(p.name), label:'Pacientes con riesgo de no-show o sin visita reciente'},
  {re:/(churn|riesgo|engagement bajo|cancelar)/i, type:'member', filter:m => /Ruth|Pablo|Carmen|Diego/.test(m.name), label:'Miembros en riesgo de churn'},
  {re:/(vip|alto valor|alto ltv|premium)/i, all:true, filter:it => /VIP|VIP/.test(it.meta) || (it.data?.plan==='VIP') || (it.data?.ltv && parseInt(String(it.data.ltv).replace(/[^0-9]/g,''))>3000), label:'Entidades VIP / alto valor'},
  {re:/(facturas? vencidas?|sin pagar|impagad|pendientes? cobro)/i, type:'invoice', filter:f => /Vencida|Pendiente/.test(f.meta), label:'Facturas vencidas o pendientes'},
  {re:/(grants? cierran?|próximo cierre|deadline cerca)/i, type:'grant', filter:g => /drafting|cierre|6 d/i.test(g.meta), label:'Grants próximos a cerrar'},
  {re:/(tickets? urgent|sla)/i, type:'ticket', filter:t => /URGENTE|2 h|4 h/.test(t.meta), label:'Tickets urgentes'},
  {re:/(stock|peptid|inventario)/i, type:'patient', filter:()=>false, label:'Inventario crítico (saltar a Clínica > Inventario)'},
  {re:/(últimos pacientes|nuevos? pacientes|recientes)/i, type:'patient', filter:()=>true, label:'Pacientes recientes'},
  {re:/(margen|p&l|ingresos)/i, all:true, filter:it => it.type === 'invoice', label:'Análisis financiero · facturas'}
];

function nlSearch(q){
  if (!q || q.length < 4) return null;
  for (const pat of NL_PATTERNS){
    if (pat.re.test(q)){
      const pool = pat.all ? SEARCH_INDEX : SEARCH_INDEX.filter(it => it.type === pat.type);
      const results = pool.filter(pat.filter);
      return { label: pat.label, results };
    }
  }
  return null;
}

let _sigDrawing = false, _sigCtx = null;
function sigStart(e){
  e.preventDefault();
  const cnv = document.getElementById('sigCanvas'); if(!cnv) return;
  _sigCtx = cnv.getContext('2d');
  _sigCtx.strokeStyle = '#0a1929'; _sigCtx.lineWidth = 2; _sigCtx.lineCap='round';
  _sigDrawing = true;
  document.getElementById('sigPad').classList.add('signed');
  const rect = cnv.getBoundingClientRect();
  const pt = e.touches ? e.touches[0] : e;
  _sigCtx.beginPath();
  _sigCtx.moveTo(pt.clientX - rect.left, pt.clientY - rect.top);
}
function sigMove(e){
  if (!_sigDrawing || !_sigCtx) return;
  e.preventDefault();
  const cnv = document.getElementById('sigCanvas');
  const rect = cnv.getBoundingClientRect();
  const pt = e.touches ? e.touches[0] : e;
  _sigCtx.lineTo(pt.clientX - rect.left, pt.clientY - rect.top);
  _sigCtx.stroke();
}
function sigEnd(){ _sigDrawing = false; }
function sigClear(){
  const cnv = document.getElementById('sigCanvas'); if(!cnv) return;
  cnv.getContext('2d').clearRect(0,0,cnv.width,cnv.height);
  document.getElementById('sigPad').classList.remove('signed');
}

/* What-if calculator */
function wifUpdate(){
  const p1 = +document.getElementById('wifS1').value;
  const p2 = +document.getElementById('wifS2').value;
  const p3 = +document.getElementById('wifS3').value;
  const p4 = +document.getElementById('wifS4').value;
  document.getElementById('wifP1').textContent = (p1>=0?'+':'') + p1 + ' %';
  document.getElementById('wifP2').textContent = '$ ' + p2.toFixed(1) + ' K';
  document.getElementById('wifP3').textContent = '+' + p3;
  document.getElementById('wifP4').textContent = p4;
  // Cálculo simplificado: baseline $552 K Q2; precios afectan margen, ads afecta MRR + CAC, headcount afecta capacidad, deals = $130K cada uno extra/menos vs 3
  const baseline = 552;
  const deltaPrecios = 268 * (p1/100); // ingresos clínica $268K YTD * %subida
  const deltaAds = (p2 - 4) * 5; // cada $K extra en ads = +$5K MRR
  const deltaHc = p3 * 18; // cada fisio nuevo = +$18K/trim
  const deltaDeals = (p4 - 3) * 130; // cada deal = $130K
  const total = baseline + deltaPrecios + deltaAds + deltaHc + deltaDeals;
  const delta = total - baseline;
  document.getElementById('wifResult').textContent = '$ ' + Math.round(total) + ' K';
  const cls = delta >= 0 ? 'ok' : 'err';
  const sign = delta >= 0 ? '▲' : '▼';
  document.getElementById('wifDelta').innerHTML = `<span style="color:var(--${cls})">${sign} ${delta>=0?'+':''}${Math.round(delta)} K vs baseline</span>`;
}

/* Cohort explorer */
function renderCohort(){
  const type = document.getElementById('cohType')?.value || 'member';
  const metric = document.getElementById('cohMetric')?.value || 'retention';
  const cohorts = ['Dic 25','Ene 26','Feb 26','Mar 26','Abr 26','May 26'];
  const data = {};
  cohorts.forEach((c,i) => {
    data[c] = [];
    const total = Math.floor(60 + Math.random()*60);
    for (let m = 0; m <= 5-i; m++){
      let v;
      if (metric === 'retention') v = Math.max(40, Math.round(100 - m*8 - Math.random()*5));
      else if (metric === 'ltv') v = Math.round((m+1) * (300 + Math.random()*200));
      else v = Math.round((m+1) * (8 + Math.random()*4) * 10) / 10;
      data[c].push(v);
    }
  });
  const months = ['M0','M1','M2','M3','M4','M5','M6'];
  const colorScale = (v, max) => {
    const t = v / max;
    const r = Math.round(184 - t*60), g = Math.round(115 + t*40), b = Math.round(51 + t*70);
    return `rgb(${r},${g},${b})`;
  };
  const max = metric === 'retention' ? 100 : Math.max(...Object.values(data).flat());
  const html = `<table class="coh-table">
    <thead><tr><th class="label">Cohorte</th>${months.map(m => `<th>${m}</th>`).join('')}</tr></thead>
    <tbody>
      ${cohorts.map(c => `<tr><td class="label">${c}</td>${data[c].map(v => `<td><span class="coh-cell" style="background:${colorScale(v,max)}">${metric==='ltv'?'$':''}${v}${metric==='retention'?'%':metric==='mrr'?'K':''}</span></td>`).join('')}${months.slice(data[c].length).map(()=>'<td></td>').join('')}</tr>`).join('')}
    </tbody></table>`;
  document.getElementById('cohTable').innerHTML = html;
}

function renderAuditRows(){
  return AUDIT_LOG.filter(a => {
    if (window._aFilter?.user && a.who !== window._aFilter.user) return false;
    if (window._aFilter?.action && a.badge !== window._aFilter.action) return false;
    if (window._aFilter?.q && !(a.what.toLowerCase().includes(window._aFilter.q.toLowerCase()) || a.who.toLowerCase().includes(window._aFilter.q.toLowerCase()))) return false;
    return true;
  }).map(a => `
    <div class="audit-row">
      <div class="who"><span class="av">${a.ini}</span>${a.who.split(' ')[0]}</div>
      <div><span class="badge ${a.badge}">${a.action}</span></div>
      <div class="what">${a.what}</div>
      <div class="when">${a.when}</div>
    </div>`).join('') || '<p class="muted" style="text-align:center;padding:20px">Sin eventos para los filtros aplicados</p>';
}
function filterAudit(k, v){
  window._aFilter = window._aFilter || {};
  window._aFilter[k] = v;
  document.getElementById('auditList').innerHTML = renderAuditRows();
}

/* 38 · SKELETON LOADERS */
function showSkeleton(){
  const c = document.getElementById('content');
  if (!c) return;
  c.classList.add('loading');
  // Inject skeleton shimmer overlay if not exists
  if (!document.getElementById('skelOverlay')){
    const skel = document.createElement('div');
    skel.id = 'skelOverlay';
    skel.style.cssText = 'position:absolute;top:80px;left:0;right:0;padding:26px 30px;pointer-events:none;z-index:1';
    skel.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px">
        ${Array(4).fill('<div class="skel-card"><span class="skel skel-line short"></span><span class="skel skel-line" style="height:28px;margin:8px 0"></span><span class="skel skel-line med"></span></div>').join('')}
      </div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px">
        <div class="skel-card"><span class="skel skel-line short" style="height:18px"></span><span class="skel" style="display:block;width:100%;height:200px;margin-top:14px;border-radius:8px"></span></div>
        <div class="skel-card"><span class="skel skel-line short" style="height:18px"></span>${Array(5).fill('<div style="display:flex;gap:10px;margin-top:10px"><span class="skel" style="width:34px;height:34px;border-radius:8px"></span><div style="flex:1"><span class="skel skel-line med"></span><span class="skel skel-line short"></span></div></div>').join('')}</div>
      </div>`;
    document.querySelector('.main').appendChild(skel);
  }
  document.getElementById('skelOverlay').style.display = 'block';
}
function hideSkeleton(){
  const c = document.getElementById('content');
  if (c) c.classList.remove('loading');
  const overlay = document.getElementById('skelOverlay');
  if (overlay) overlay.style.display = 'none';
}
const _origRVH = renderView;
renderView = function(){
  showSkeleton();
  setTimeout(() => {
    _origRVH();
    setTimeout(hideSkeleton, 180);
  }, 220);
};

function showKbdHelp(){
  let pop = document.getElementById('kbdPop');
  if (!pop){
    pop = document.createElement('div');
    pop.id = 'kbdPop';
    pop.className = 'kbd-help';
    pop.innerHTML = `<h3>Atajos de teclado</h3>
      ${SHORTCUTS.map(s => `<div class="kbd-row"><div class="kbd-keys">${s.k.map(k=>`<kbd>${k}</kbd>`).join('+')}</div><div class="desc">${s.d}</div></div>`).join('')}
      <p style="margin-top:14px;font-size:11.5px;color:var(--muted);text-align:center">Pulsa <kbd style="font-family:var(--mono);background:var(--paper-2);border:1px solid var(--line);padding:1px 6px;border-radius:4px">?</kbd> u <kbd style="font-family:var(--mono);background:var(--paper-2);border:1px solid var(--line);padding:1px 6px;border-radius:4px">Esc</kbd> para cerrar</p>`;
    document.body.appendChild(pop);
  }
  pop.classList.toggle('open');
}

let _gPrefix = false, _gTimer = null;
document.addEventListener('keydown', e => {
  // Don't trigger shortcuts when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT' || e.target.isContentEditable) return;
  const meta = e.metaKey || e.ctrlKey;

  if (e.key === '?' && e.shiftKey){ e.preventDefault(); showKbdHelp(); return; }
  if (e.key === 'Escape'){
    document.getElementById('kbdPop')?.classList.remove('open');
    if (document.body.classList.contains('presenting')) togglePresenting();
    return;
  }
  if (meta && e.key.toLowerCase() === 'p'){ /* let browser print */ return; }
  if (!meta && e.key.toLowerCase() === 'p'){ e.preventDefault(); togglePresenting(); return; }
  if (e.key === '/'){ e.preventDefault(); openCmdk(); return; }
  if (!meta && e.key.toLowerCase() === 't'){ e.preventDefault(); toggleTheme(); return; }
  if (!meta && e.key.toLowerCase() === 'b'){ e.preventDefault(); toggleSidebar(); return; }
  if (!meta && e.key.toLowerCase() === 'n'){ e.preventDefault(); openNewModal('paciente'); return; }

  // Two-key sequences with G prefix (vim-style)
  if (!meta && e.key.toLowerCase() === 'g' && !_gPrefix){
    _gPrefix = true;
    clearTimeout(_gTimer);
    _gTimer = setTimeout(() => _gPrefix = false, 1200);
    toast('G… esperando segunda tecla (D/C/R/E/I/F/A)');
    return;
  }
  if (_gPrefix){
    e.preventDefault();
    _gPrefix = false; clearTimeout(_gTimer);
    const map = {d:['holding','dashboard'],c:['clinica','dashboard'],r:['residences','dashboard'],e:['ecommerce','dashboard'],i:['rd','dashboard'],a:['holding','copilot'],f:[state.ws,'finanzas']};
    const target = map[e.key.toLowerCase()];
    if (target){
      if (target[0] !== state.ws) setWs(target[0]);
      setTimeout(() => go(target[1]), 80);
    }
  }
});
